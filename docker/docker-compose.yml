services:

  # ── SQL Server ────────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: own-delivery-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Express}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - own-delivery-net

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    image: own-delivery-backend:latest
    container_name: own-delivery-backend
    build:
      context: ../../own-delivery-backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      JwtSettings__Secret: ${JwtSettings__Secret}
      JwtSettings__Issuer: ${JwtSettings__Issuer:-OwnDeliveryApi}
      JwtSettings__Audience: ${JwtSettings__Audience:-OwnDeliveryClients}
      JwtSettings__AccessTokenExpirationMinutes: ${JwtSettings__AccessTokenExpirationMinutes:-60}
      JwtSettings__RefreshTokenExpirationDays: ${JwtSettings__RefreshTokenExpirationDays:-30}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - own-delivery-net
    restart: unless-stopped

  # ── Design / Storybook ───────────────────────────────────────────────────
  design:
    image: own-delivery-design:latest
    container_name: own-delivery-design
    build:
      context: ../../own-delivery-design
      dockerfile: Dockerfile
    ports:
      - "${DESIGN_PORT:-6006}:6006"
    networks:
      - own-delivery-net
    restart: unless-stopped

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: own-delivery-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - design
    networks:
      - own-delivery-net
    restart: unless-stopped

volumes:
  mssql_data:

networks:
  own-delivery-net:
    driver: bridge
